<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>地球防衛OPS</title>
  <style>
    :root {
      --bg:     #F3F7FF;
      --bg2:    #FFFFFF;
      --bg3:    #E8EEFF;
      --accent: #1A5CCC;
      --accent2:#0A3D99;
      --cyan:   #0088BB;
      --cyan-dim: rgba(0,136,187,0.12);
      --text:   #0D1A35;
      --dim:    #6677AA;
      --done:   #1A9965;
      --done-bg: #E6F7F0;
      --skip:   #CC4422;
      --skip-bg: #FFF0EB;
      --gold:   #BB8800;
      --border: #CDD8EE;
      --shadow: 0 2px 12px rgba(26,92,204,0.09);
      --safe:   48px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
      font-size: 16px; overscroll-behavior: none; -webkit-font-smoothing: antialiased;
    }

    /* ======= レイアウト ======= */
    .app { display: flex; flex-direction: column; height: 100dvh; }
    header {
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
      padding: 16px 18px 14px; padding-top: max(16px, env(safe-area-inset-top));
      background: var(--accent); color: #fff;
    }
    .logo { font-size: 17px; font-weight: 700; letter-spacing: 1px; }
    .logo-sub { font-size: 10px; opacity: .7; letter-spacing: 2px; margin-top: 2px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #5DFFA0; margin-left: auto; flex-shrink: 0; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .pad { padding: 16px; }
    nav { flex-shrink: 0; display: flex; border-top: 1px solid var(--border); background: var(--bg2); padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; min-height: var(--safe); background: none; border: none; color: var(--dim); font-family: inherit; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 0; }
    .nav-btn .icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: var(--accent); font-weight: 600; }
    .tab { display: none; }
    .tab.active { display: block; }

    /* ======= 共通部品 ======= */
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--dim); margin-bottom: 10px; text-transform: uppercase; }
    .btn { min-height: var(--safe); width: 100%; border: none; border-radius: 12px; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .15s, transform .1s; -webkit-appearance: none; }
    .btn:active { transform: scale(0.97); opacity: .85; }
    .btn:disabled { opacity: .38; pointer-events: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--bg3); color: var(--dim); border: 1.5px solid var(--border); }
    .btn-done { background: var(--done-bg); color: var(--done); border: 1.5px solid rgba(26,153,101,.35); }
    .btn-skip { background: var(--skip-bg); color: var(--skip); border: 1.5px solid rgba(204,68,34,.3); }
    .btn-min { background: #FFF8E0; color: var(--gold); border: 1.5px solid rgba(187,136,0,.35); font-size: 15px; margin-top: 8px; }
    input[type="text"], input[type="time"], select {
      width: 100%; min-height: var(--safe); background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text); padding: 0 14px; font-family: inherit;
      font-size: 16px; outline: none; -webkit-appearance: none; margin-bottom: 10px;
    }
    input[type="text"]:focus, input[type="time"]:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--cyan-dim); }
    input::placeholder { color: var(--dim); opacity: .7; }

    /* ======= ミッション追加フォーム ======= */
    .add-toggle { width: 100%; min-height: var(--safe); background: var(--bg2); border: 1.5px dashed var(--border); border-radius: 14px; color: var(--accent); font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px; -webkit-appearance: none; }
    .add-form { display: none; background: var(--bg2); border: 1.5px solid var(--cyan-dim); border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .add-form.open { display: block; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--dim); margin-bottom: 6px; }

    /* ======= ミッションカード ======= */
    .mission-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 12px 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; box-shadow: var(--shadow); transition: border-color .2s; }
    .mission-card:active { background: var(--bg3); }
    .mission-card.selected { border-color: var(--accent); background: #EDF4FF; }
    .mission-card .goal { flex: 1; font-size: 16px; font-weight: 500; line-height: 1.45; }
    .mission-card .meta { font-size: 12px; color: var(--dim); margin-top: 3px; }
    .del-btn { background: none; border: none; color: var(--dim); font-size: 22px; padding: 6px; cursor: pointer; min-width: var(--safe); min-height: var(--safe); display: flex; align-items: center; justify-content: center; }

    /* ======= ストリークバー ======= */
    .streak-panel { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .streak-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .streak-item { display: flex; flex-direction: column; align-items: center; flex: 1; background: var(--bg3); border-radius: 10px; padding: 10px 4px; }
    .streak-num { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
    .streak-num.fire { color: var(--gold); }
    .streak-label { font-size: 11px; color: var(--dim); margin-top: 3px; }
    .progress-wrap { display: flex; flex-direction: column; gap: 5px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); }
    .progress-track { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 4px; transition: width .6s ease; }
    .milestone { font-size: 13px; color: var(--gold); font-weight: 600; text-align: center; margin-top: 6px; }

    /* ======= If-Thenボックス ======= */
    .if-then-box { background: var(--bg2); border-left: 4px solid var(--accent); border-radius: 0 12px 12px 0; padding: 12px 14px; font-size: 14px; line-height: 1.8; color: var(--dim); margin-bottom: 12px; box-shadow: var(--shadow); }
    .if-then-box b { color: var(--accent); }

    /* ======= 司令室 ======= */
    .command-room { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; min-height: 100px; box-shadow: var(--shadow); }
    .command-room.special { border-color: var(--gold); background: #FFFCE8; }
    .char-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .char-name { background: var(--bg3); border: 1.5px solid var(--accent); border-radius: 20px; padding: 5px 14px; font-size: 14px; font-weight: 600; color: var(--accent); }
    .char-name.special { border-color: var(--gold); color: var(--gold); background: #FFF8E0; }
    .char-personality { font-size: 12px; color: var(--dim); line-height: 1.5; flex-basis: 100%; margin-top: 2px; }
    .char-msg { font-size: 16px; line-height: 2; white-space: pre-wrap; color: var(--text); }
    .report-row { display: flex; gap: 10px; }
    .report-row .btn { flex: 1; font-size: 15px; }
    .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
    .badge-done { background: var(--done-bg); color: var(--done); }
    .badge-skip { background: var(--skip-bg); color: var(--skip); }
    .badge-wait { background: var(--bg3); color: var(--dim); }

    /* ======= 達成アニメーション ======= */
    .flash-overlay { position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; z-index: 100; transition: opacity .1s; }
    .flash-overlay.show { opacity: .12; }
    .stars-container { position: fixed; inset: 0; pointer-events: none; z-index: 101; overflow: hidden; }
    .star { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: fall 1.2s ease-out forwards; }
    @keyframes fall { 0%{transform:translateY(-20px) scale(1);opacity:1} 100%{transform:translateY(100vh) scale(0);opacity:0} }

    /* ======= カレンダー ======= */
    .calendar-wrap { margin-bottom: 20px; }
    .cal-month-label { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-label { font-size: 10px; color: var(--dim); text-align: center; padding: 3px 0; font-weight: 600; }
    .cal-cell { aspect-ratio: 1; border-radius: 4px; background: var(--bg3); border: 1px solid var(--border); }
    .cal-cell.done { background: var(--done); border-color: var(--done); }
    .cal-cell.skip { background: var(--skip); border-color: var(--skip); opacity: .5; }
    .cal-cell.today { border: 2px solid var(--accent); }
    .cal-cell.future { opacity: .25; }
    .cal-legend { display: flex; gap: 14px; margin-top: 10px; }
    .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--dim); }
    .cal-legend-dot { width: 11px; height: 11px; border-radius: 3px; }

    /* ======= ローディング ======= */
    .loading-row { display: flex; align-items: center; gap: 10px; color: var(--accent); font-size: 14px; padding: 10px 0; }
    .spin { width: 20px; height: 20px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ======= アーカイブ ======= */
    .arc-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .arc-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .arc-date { font-size: 13px; font-weight: 600; color: var(--dim); }
    .arc-char { font-size: 13px; color: var(--accent); }
    .arc-msg { font-size: 14px; color: #445; line-height: 1.75; white-space: pre-wrap; }

    .empty { text-align: center; color: var(--dim); font-size: 14px; padding: 36px 16px; line-height: 1.9; }
    .section-gap { height: 20px; }
    .err { background: var(--skip-bg); border: 1.5px solid rgba(204,68,34,.25); border-radius: 10px; padding: 12px 16px; font-size: 14px; color: var(--skip); margin-top: 8px; }
  </style>
</head>
<body>
<div class="app">

  <div class="flash-overlay" id="flashOverlay"></div>
  <div class="stars-container" id="starsContainer"></div>

  <header>
    <div>
      <div class="logo">◈ EARTH DEFENSE OPS</div>
      <div class="logo-sub">地球防衛オペレーション</div>
    </div>
    <div class="dot"></div>
  </header>

  <div class="scroll">

    <!-- ===== 作戦本部 ===== -->
    <div id="tab-base" class="tab active pad">

      <!-- ミッション追加フォーム（1ステップ） -->
      <button class="add-toggle" id="addToggle" onclick="toggleAddForm()">＋ 新規ミッション登録</button>
      <div class="add-form" id="addForm">
        <div class="field-label">▶ 継続したいこと</div>
        <input type="text" id="goalInput" placeholder="例：毎日スクワット20回" />
        <div class="field-label">▶ 通知・実行時刻（毎日この時間にメール通知）</div>
        <input type="time" id="notifyTime" value="21:00" />
        <button class="btn btn-primary" id="createBtn" onclick="doCreateMission()">ミッションを開始する</button>
      </div>

      <div class="section-label">アクティブミッション</div>
      <div id="missionList">
        <div class="loading-row"><div class="spin"></div>読み込み中…</div>
      </div>

      <div class="section-gap"></div>
      <div id="commandArea">
        <div class="empty">↑ ミッションを選択して<br>今日の通信官を呼び出す</div>
      </div>
    </div>

    <!-- ===== 戦績タブ ===== -->
    <div id="tab-archive" class="tab pad">
      <div class="section-label">ミッション選択</div>
      <select id="archiveSelect" onchange="loadArchiveAndCal()" style="margin-bottom:16px">
        <option value="">-- ミッションを選択 --</option>
      </select>
      <div id="calendarArea"></div>
      <div class="section-label" style="margin-top:8px">通信ログ</div>
      <div id="archiveList"><div class="empty">ミッションを選択してください</div></div>
    </div>

  </div>

  <nav>
    <button class="nav-btn active" id="nav-base" onclick="switchTab('base')"><span class="icon">⚡</span>作戦本部</button>
    <button class="nav-btn" id="nav-archive" onclick="switchTab('archive')"><span class="icon">📅</span>戦績</button>
  </nav>
</div>

<script>
var missions = [];
var selectedId = localStorage.getItem('selectedMissionId') || null;

// ============================================================
// タブ切り替え
// ============================================================
function switchTab(name) {
  ['base','archive'].forEach(function(n) {
    document.getElementById('tab-' + n).classList.toggle('active', n === name);
    document.getElementById('nav-' + n).classList.toggle('active', n === name);
  });
  if (name === 'archive') syncArchiveSelect();
}

// ============================================================
// 初期化
// ============================================================
window.onload = function() {
  google.script.run
    .withSuccessHandler(function(list) {
      missions = list || [];
      renderMissions();
      if (selectedId && missions.find(function(m){ return m.id === selectedId; })) {
        loadTodayMission(selectedId);
      }
    })
    .withFailureHandler(showErr)
    .getMissions();
};

// ============================================================
// ミッション一覧描画
// ============================================================
function renderMissions() {
  var el = document.getElementById('missionList');
  if (!missions.length) {
    el.innerHTML = '<div class="empty">ミッションがありません。<br>上の「＋」から登録してください。</div>';
    return;
  }
  el.innerHTML = missions.map(function(m) {
    return '<div class="mission-card' + (m.id === selectedId ? ' selected' : '') + '" onclick="selectMission(\'' + m.id + '\')">'
      + '<div style="flex:1"><div class="goal">' + esc(m.goalText) + '</div>'
      + '<div class="meta">' + (m.notifyTime ? '🔔 ' + esc(m.notifyTime) + '　' : '') + m.createdDate + '</div></div>'
      + '<button class="del-btn" onclick="removeMission(event,\'' + m.id + '\')">×</button>'
      + '</div>';
  }).join('');
}

function selectMission(id) {
  selectedId = id;
  localStorage.setItem('selectedMissionId', id);
  renderMissions();
  loadTodayMission(id);
  setTimeout(function() {
    var el = document.getElementById('commandArea');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ============================================================
// フォームトグル
// ============================================================
function toggleAddForm() {
  var f = document.getElementById('addForm');
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('goalInput').focus();
}

// ============================================================
// ミッション作成（1ステップ）
// ============================================================
function doCreateMission() {
  var goal = document.getElementById('goalInput').value.trim();
  var notifyTime = document.getElementById('notifyTime').value;
  if (!goal) { alert('継続したいことを入力してください'); return; }

  var btn = document.getElementById('createBtn');
  btn.disabled = true; btn.textContent = 'キャラとミッションを生成中…';

  google.script.run
    .withSuccessHandler(function(mission) {
      btn.disabled = false; btn.textContent = 'ミッションを開始する';
      missions.push(mission);
      renderMissions();
      syncArchiveSelect();
      document.getElementById('goalInput').value = '';
      document.getElementById('addForm').classList.remove('open');
      selectMission(mission.id);
    })
    .withFailureHandler(function(e) {
      btn.disabled = false; btn.textContent = 'ミッションを開始する';
      showErr(e);
    })
    .createMission(goal, notifyTime);
}

// ============================================================
// 今日のキャラ読み込み
// ============================================================
function loadTodayMission(id) {
  var mission = missions.find(function(m){ return m.id === id; });
  var area = document.getElementById('commandArea');
  area.innerHTML = buildIfThenBox(mission)
    + '<div class="command-room"><div class="loading-row"><div class="spin"></div>通信官を呼び出し中…</div></div>';

  google.script.run
    .withSuccessHandler(function(data) { renderCommandRoom(data, id); })
    .withFailureHandler(showErr)
    .getTodayMission(id);
}

function buildIfThenBox(mission) {
  if (!mission) return '';
  return '<div class="if-then-box">'
    + (mission.timing ? '<b>タイミング：</b>' + esc(mission.timing) + '<br>' : '')
    + '<b>If-Then：</b>' + esc(mission.ifThenTrigger) + '<br>'
    + '<b>使命：</b>' + esc(mission.worldStory) + '</div>';
}

// ============================================================
// ストリーク・司令室描画
// ============================================================
function renderCommandRoom(data, id) {
  var mission = missions.find(function(m){ return m.id === id; });
  var area = document.getElementById('commandArea');
  var isSpecial = data.isSpecial;

  var badge = data.result === 'done'
    ? '<span class="badge badge-done">✓ 本日完了</span>'
    : data.result === 'skip'
    ? '<span class="badge badge-skip">⚡ タイムリープ済</span>'
    : '';

  var btnsDisabled = data.result ? ' disabled' : '';
  var btnsHtml = '<div class="report-row">'
    + '<button class="btn btn-done" id="doneBtn" onclick="report(\'done\',\'' + id + '\')"' + btnsDisabled + '>✦ 任務完了！</button>'
    + '<button class="btn btn-skip" id="skipBtn" onclick="report(\'skip\',\'' + id + '\')"' + btnsDisabled + '>⚡ エネルギー不足…</button>'
    + '</div>';

  var minBtn = (data.result === 'skip')
    ? '<button class="btn btn-min" id="minBtn" onclick="reportMin(\'' + id + '\')">⚡ 1回だけやってみる（タイムリープ完遂）</button>'
    : '';

  area.innerHTML = buildIfThenBox(mission)
    + '<div id="streakPanel" class="streak-panel"><div class="loading-row"><div class="spin"></div>戦績を集計中…</div></div>'
    + '<div class="command-room' + (isSpecial ? ' special' : '') + '">'
    +   '<div class="char-header">'
    +     '<span class="char-name' + (isSpecial ? ' special' : '') + '">' + (isSpecial ? '★ ' : '') + esc(data.characterName) + '</span>'
    +     badge
    +     '<span class="char-personality">' + esc(data.characterPersonality) + '</span>'
    +   '</div>'
    +   '<div class="char-msg" id="charMsg">' + esc(data.responseText) + '</div>'
    + '</div>'
    + btnsHtml + minBtn
    + '<div id="reportStatus"></div>';

  google.script.run
    .withSuccessHandler(function(stats) { renderStreak(stats); })
    .withFailureHandler(function() { document.getElementById('streakPanel').style.display = 'none'; })
    .getStats(id);
}

function renderStreak(stats) {
  var panel = document.getElementById('streakPanel');
  if (!panel) return;
  var pct66 = Math.min(100, Math.round(stats.totalDone / 66 * 100));
  var milestone = pct66 >= 100 ? '🎉 習慣化達成！' : pct66 >= 50 ? '💪 折り返し地点突破！' : '';

  panel.innerHTML = '<div class="streak-row">'
    + '<div class="streak-item"><div class="streak-num fire">🔥' + stats.currentStreak + '</div><div class="streak-label">連続日数</div></div>'
    + '<div class="streak-item"><div class="streak-num">' + stats.bestStreak + '</div><div class="streak-label">最高記録</div></div>'
    + '<div class="streak-item"><div class="streak-num">' + stats.totalDone + '</div><div class="streak-label">累計完了</div></div>'
    + '<div class="streak-item"><div class="streak-num">' + stats.totalDays + '</div><div class="streak-label">挑戦日数</div></div>'
    + '</div>'
    + '<div class="progress-wrap">'
    +   '<div class="progress-label"><span>習慣化まで</span><span>' + stats.totalDone + '/66日</span></div>'
    +   '<div class="progress-track"><div class="progress-fill" style="width:' + pct66 + '%"></div></div>'
    + '</div>'
    + (milestone ? '<div class="milestone">' + milestone + '</div>' : '');
}

// ============================================================
// 報告
// ============================================================
function report(type, id) {
  var doneBtn = document.getElementById('doneBtn');
  var skipBtn = document.getElementById('skipBtn');
  var statusEl = document.getElementById('reportStatus');
  doneBtn.disabled = true; skipBtn.disabled = true;
  statusEl.innerHTML = '<div class="loading-row"><div class="spin"></div>並行世界へ送信中…</div>';

  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('charMsg').textContent = result.response;
      statusEl.innerHTML = '';
      var badge = type === 'done'
        ? '<span class="badge badge-done">✓ 本日完了</span>'
        : '<span class="badge badge-skip">⚡ タイムリープ済</span>';
      var header = document.querySelector('.char-header');
      if (header) { var old = header.querySelector('.badge'); if (old) old.remove(); header.insertAdjacentHTML('beforeend', badge); }

      if (type === 'done') {
        triggerDoneAnimation();
        var minBtn = document.getElementById('minBtn');
        if (minBtn) minBtn.style.display = 'none';
      } else {
        if (!document.getElementById('minBtn')) {
          statusEl.insertAdjacentHTML('beforebegin', '<button class="btn btn-min" id="minBtn" onclick="reportMin(\'' + id + '\')">⚡ 1回だけやってみる（タイムリープ完遂）</button>');
        }
      }
      google.script.run.withSuccessHandler(renderStreak).getStats(id);
    })
    .withFailureHandler(function(e) {
      statusEl.innerHTML = '<div class="err">エラー：' + esc(e.message || String(e)) + '</div>';
      doneBtn.disabled = false; skipBtn.disabled = false;
    })
    [type === 'done' ? 'reportDone' : 'reportSkip'](id);
}

function reportMin(id) {
  var btn = document.getElementById('minBtn');
  if (btn) { btn.disabled = true; btn.textContent = '記録中…'; }
  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('charMsg').textContent = result.response;
      if (btn) btn.style.display = 'none';
      triggerDoneAnimation();
      google.script.run.withSuccessHandler(renderStreak).getStats(id);
    })
    .withFailureHandler(showErr)
    .reportDone(id);
}

// ============================================================
// 達成アニメーション
// ============================================================
function triggerDoneAnimation() {
  var overlay = document.getElementById('flashOverlay');
  overlay.classList.add('show');
  setTimeout(function() { overlay.classList.remove('show'); }, 250);

  var container = document.getElementById('starsContainer');
  container.innerHTML = '';
  for (var i = 0; i < 12; i++) {
    var star = document.createElement('div');
    star.className = 'star';
    star.style.left = (5 + i * 8) + 'vw';
    star.style.animationDelay = (i * 0.06) + 's';
    star.style.background = i % 3 === 0 ? '#FFD700' : i % 3 === 1 ? '#1A5CCC' : '#5DFFA0';
    container.appendChild(star);
  }
  setTimeout(function() { container.innerHTML = ''; }, 1400);
}

// ============================================================
// ミッション削除
// ============================================================
function removeMission(event, id) {
  event.stopPropagation();
  if (!confirm('このミッションを終了しますか？')) return;
  google.script.run
    .withSuccessHandler(function() {
      missions = missions.filter(function(m){ return m.id !== id; });
      if (selectedId === id) {
        selectedId = null; localStorage.removeItem('selectedMissionId');
        document.getElementById('commandArea').innerHTML = '<div class="empty">↑ ミッションを選択して<br>今日の通信官を呼び出す</div>';
      }
      renderMissions(); syncArchiveSelect();
    })
    .withFailureHandler(showErr)
    .deleteMission(id);
}

// ============================================================
// 戦績 + カレンダー
// ============================================================
function syncArchiveSelect() {
  var sel = document.getElementById('archiveSelect');
  sel.innerHTML = '<option value="">-- ミッションを選択 --</option>';
  missions.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.goalText;
    sel.appendChild(opt);
  });
}

function loadArchiveAndCal() {
  var id = document.getElementById('archiveSelect').value;
  var calArea = document.getElementById('calendarArea');
  var list = document.getElementById('archiveList');
  if (!id) {
    calArea.innerHTML = '';
    list.innerHTML = '<div class="empty">ミッションを選択してください</div>';
    return;
  }
  calArea.innerHTML = '<div class="loading-row"><div class="spin"></div>カレンダーを生成中…</div>';
  list.innerHTML = '<div class="loading-row"><div class="spin"></div>通信ログを取得中…</div>';

  google.script.run
    .withSuccessHandler(function(stats) { renderCalendar(stats); })
    .withFailureHandler(function() { calArea.innerHTML = ''; })
    .getStats(id);

  google.script.run
    .withSuccessHandler(function(logs) { renderArchiveList(logs); })
    .withFailureHandler(showErr)
    .getArchive(id);
}

function renderCalendar(stats) {
  var calArea = document.getElementById('calendarArea');
  var today = new Date();
  var todayStr = formatDate(today);

  var html = '<div class="section-label">継続カレンダー</div>';
  html += '<div class="cal-legend">'
    + '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--done)"></div>完了</div>'
    + '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--skip);opacity:.5"></div>サボり</div>'
    + '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--bg3);border:1px solid var(--border)"></div>未報告</div>'
    + '</div><div style="height:14px"></div>';

  for (var m = 1; m >= 0; m--) {
    var d = new Date(today.getFullYear(), today.getMonth() - m, 1);
    var year = d.getFullYear(), month = d.getMonth();
    var firstDay = new Date(year, month, 1).getDay();
    var lastDay = new Date(year, month + 1, 0).getDate();

    html += '<div class="calendar-wrap"><div class="cal-month-label">' + year + '年' + (month + 1) + '月</div>';
    html += '<div class="cal-grid">';
    ['日','月','火','水','木','金','土'].forEach(function(l) { html += '<div class="cal-day-label">' + l + '</div>'; });

    for (var i = 0; i < firstDay; i++) html += '<div></div>';
    for (var day = 1; day <= lastDay; day++) {
      var dateStr = year + '-' + pad(month + 1) + '-' + pad(day);
      var result = stats.calendarData[dateStr] || '';
      var cls = 'cal-cell';
      if (result === 'done') cls += ' done';
      else if (result === 'skip') cls += ' skip';
      if (dateStr === todayStr) cls += ' today';
      if (dateStr > todayStr) cls += ' future';
      html += '<div class="' + cls + '" title="' + dateStr + '"></div>';
    }
    html += '</div></div>';
  }
  calArea.innerHTML = html;
}

function renderArchiveList(logs) {
  var list = document.getElementById('archiveList');
  if (!logs || !logs.length) { list.innerHTML = '<div class="empty">まだ戦績がありません。</div>'; return; }
  list.innerHTML = logs.map(function(log) {
    var badge = log.result === 'done'
      ? '<span class="badge badge-done">✓ 完了</span>'
      : log.result === 'skip'
      ? '<span class="badge badge-skip">⚡ サボり</span>'
      : '<span class="badge badge-wait">- 未報告</span>';
    return '<div class="arc-card"><div class="arc-head"><span class="arc-date">' + log.date + '</span>' + badge + '<span class="arc-char">' + esc(log.characterName) + '</span></div>'
      + (log.responseText ? '<div class="arc-msg">' + esc(log.responseText) + '</div>' : '') + '</div>';
  }).join('');
}

// ============================================================
// ユーティリティ
// ============================================================
function showErr(e) { alert('エラー：' + (e && e.message ? e.message : String(e))); }
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pad(n) { return n < 10 ? '0' + n : String(n); }
function formatDate(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
</script>
